name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'stone-js-website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (SSG + Pagefind index)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo builds the workspace dependencies first, then the website.
      # The website's build script runs `stone build && pagefind --site dist`.
      - name: Build website
        run: pnpm turbo run build --filter=@stone-js/website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stone-js-website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
