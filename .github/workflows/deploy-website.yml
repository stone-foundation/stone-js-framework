name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'stone-js-website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (SSG + Pagefind index)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Build the framework packages first, in dependency order, with `pnpm -r` (NOT turbo: turbo
      # races the per-file .d.ts emit, so a dependent builds before @stone-js/core's dist exists —
      # "Cannot find module '@stone-js/core'"). Then build the website against the built dist.
      - name: Build framework packages
        run: pnpm run build:ci

      # The website's build script runs `stone build && pagefind --site dist`.
      - name: Build website
        run: pnpm --filter @stone-js/website run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: stone-js-website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
