name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build · Lint · Test · Sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Sonar needs full history for blame/new-code.

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (high · critical)
        run: pnpm audit --audit-level=high

      # CI gates the published framework packages. The website (built + shipped by
      # deploy-website.yml) and the lab demo apps are internal apps, excluded here.
      #
      # Build BEFORE lint: type-aware lint (ts-standard) reads each package's dependency
      # types from the built dist/*.d.ts; without a prior build the workspace @stone-js/*
      # imports resolve to `any` and trip strict-boolean-expressions / return-await.
      - name: Build (packages)
        run: pnpm run build:ci

      - name: Lint
        run: pnpm run lint:ci

      - name: Test (with coverage)
        run: pnpm run test:ci

      - name: SonarCloud Scan
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
