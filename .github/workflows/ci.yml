name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build · Lint · Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Sonar needs full history for blame/new-code.

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (high · critical)
        run: pnpm audit --audit-level=high

      # Build BEFORE lint: type-aware lint (ts-standard) reads each package's dependency types
      # from the built `dist/*.d.ts`. Without a prior build the workspace `@stone-js/*` imports
      # resolve to `any`, which trips strict-boolean-expressions / return-await across core.
      - name: Build
        run: pnpm build

      # Lint is Node-version-independent; run it once on the primary Node (22).
      - name: Lint
        if: ${{ matrix.node-version == '22' }}
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm run test:coverage

      # Sonar runs once, on the primary Node version, with the aggregated lcov reports.
      - name: SonarCloud Scan
        if: ${{ matrix.node-version == '22' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
