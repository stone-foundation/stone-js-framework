# Single SonarCloud project for the whole Stone.js monorepo.
sonar.organization=stone-foundation
sonar.projectKey=stone-foundation_stone-js-framework
sonar.projectName=Stone.js

# Analyse the published framework packages. Tests are the *.spec/*.test files;
# everything else under a scanned package is treated as source.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**/*,**/*.spec.ts,**/*.test.ts

# Exclusions keep the scan small and fast (the preprocessing step indexes files):
# dependencies, build output, generated code, coverage, type decls, binary assets,
# the lockfile, and the internal apps (website, lab, starters) that are not the
# quality gate. Without these the preprocessing step crawls tens of thousands of
# files and effectively hangs.
sonar.exclusions=**/node_modules/**,**/dist/**,**/docs/**,**/coverage/**,**/.stone/**,**/*.d.ts,**/*.map,**/*.md,**/*.html,stone-js-docs/**,stone-js-starters/**,stone-js-blog-starters/**,stone-js-lab/**,stone-js-website/**,branding/**,scripts/**,pnpm-lock.yaml,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.svg,**/*.ico,**/*.webp,**/*.woff,**/*.woff2,**/*.snap

# Aggregate coverage from every framework package's lcov report.
sonar.javascript.lcov.reportPaths=stone-js-*/coverage/lcov.info

sonar.sourceEncoding=UTF-8

# ── Targeted "won't fix": rules kept on purpose, one family per comment. ──
# Each criterion pairs a ruleKey with a repo-relative resourceKey glob. These are
# deliberate design/compat decisions, not oversights; everything else Sonar flags
# has been fixed in code.
sonar.issue.ignore.multicriteria=aliases,proxyctor,redos1,redos2,redos3,redos4,redos5,redos6,compatrep1,compatrep2,compatrep3,compathas1,compathas2,compathas3,clipath1,clipath2

# S6564 — semantic public type aliases (Action, BindingValue, RawResponse, AzureFunctionsEvent…).
# They are the framework's typed contracts; inlining them to `string`/`unknown` breaks the public API.
sonar.issue.ignore.multicriteria.aliases.ruleKey=typescript:S6564
sonar.issue.ignore.multicriteria.aliases.resourceKey=**/src/declarations.ts

# S6635 — Proxiable deliberately returns a Proxy from its constructor (that is the whole point).
sonar.issue.ignore.multicriteria.proxyctor.ruleKey=typescript:S6635
sonar.issue.ignore.multicriteria.proxyctor.resourceKey=**/Proxiable.ts

# S8786 — these regexes were measured to be linear (only cloud-file's trailing-slash trim was
# genuinely quadratic and was rewritten). Rewriting the central router/config regexes blindly
# would risk real routing/parsing bugs for no measurable gain.
sonar.issue.ignore.multicriteria.redos1.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos1.resourceKey=stone-js-router/src/utils.ts
sonar.issue.ignore.multicriteria.redos2.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos2.resourceKey=stone-js-router/src/RouteMapper.ts
sonar.issue.ignore.multicriteria.redos3.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos3.resourceKey=stone-js-config/src/utils.ts
sonar.issue.ignore.multicriteria.redos4.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos4.resourceKey=stone-js-config-source/src/drivers/SsmConfigSource.ts
sonar.issue.ignore.multicriteria.redos5.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos5.resourceKey=stone-js-cli/src/react/ssg.ts
sonar.issue.ignore.multicriteria.redos6.ruleKey=typescript:S8786
sonar.issue.ignore.multicriteria.redos6.resourceKey=stone-js-cli/src/create/StarterContract.ts

# S7781 — String#replaceAll is ES2021. These packages also ship to the browser and preset-env
# runs with useBuiltIns:false (no core-js polyfills), so replace(/…/g) is kept for reach.
sonar.issue.ignore.multicriteria.compatrep1.ruleKey=typescript:S7781
sonar.issue.ignore.multicriteria.compatrep1.resourceKey=stone-js-http-core/src/JsonpResponse.ts
sonar.issue.ignore.multicriteria.compatrep2.ruleKey=typescript:S7781
sonar.issue.ignore.multicriteria.compatrep2.resourceKey=stone-js-use-view/src/head.ts
sonar.issue.ignore.multicriteria.compatrep3.ruleKey=typescript:S7781
sonar.issue.ignore.multicriteria.compatrep3.resourceKey=stone-js-use-view/src/snapshot.ts

# S6653 — Object.hasOwn is ES2022; kept as Object.prototype.hasOwnProperty.call for the same
# runtime-reach reason as S7781 above.
sonar.issue.ignore.multicriteria.compathas1.ruleKey=typescript:S6653
sonar.issue.ignore.multicriteria.compathas1.resourceKey=stone-js-config/src/utils.ts
sonar.issue.ignore.multicriteria.compathas2.ruleKey=typescript:S6653
sonar.issue.ignore.multicriteria.compathas2.resourceKey=stone-js-core/src/decorators/Metadata.ts
sonar.issue.ignore.multicriteria.compathas3.ruleKey=typescript:S6653
sonar.issue.ignore.multicriteria.compathas3.resourceKey=stone-js-pipeline/src/utils.ts

# S4036 — the CLI intentionally invokes the user's own npm/git resolved from PATH; pinning an
# absolute path is neither possible nor desirable for a scaffolding/build tool.
sonar.issue.ignore.multicriteria.clipath1.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.clipath1.resourceKey=stone-js-cli/src/create/StarterContract.ts
sonar.issue.ignore.multicriteria.clipath2.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.clipath2.resourceKey=stone-js-cli/src/react/ReactBuildMiddleware.ts
