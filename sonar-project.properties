# Single SonarCloud project for the whole Stone.js monorepo.
sonar.organization=stone-foundation
sonar.projectKey=stone-foundation_stone-js-framework
sonar.projectName=Stone.js

# Sources / tests (all modules).
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**/*,**/*.spec.ts,**/*.test.ts

# Exclusions: build output, generated typedoc, deps, non-published folders.
sonar.exclusions=**/dist/**,**/docs/**,**/node_modules/**,**/coverage/**,**/*.d.ts,stone-js-docs/**,stone-js-starters/**,branding/**,scripts/**

# Aggregate coverage from every module's lcov report.
sonar.javascript.lcov.reportPaths=stone-js-*/coverage/lcov.info

sonar.sourceEncoding=UTF-8
